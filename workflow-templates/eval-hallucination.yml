name: "Hallucination eval scorecard (reusable, hard-fail)"

# Hard-fail hallucination-rate gate (Reliability pack v1).
# - Runs when .agent-rfc/fixtures/hallucination_evals.json exists OR framework
#   fixtures/hallucination_evals_base.json is available to the runner.
# - Always hard-fails when rate exceeds threshold (no warn-only mode).
# Threshold: HALLUCINATION_FAIL_ABOVE from tenant .env / repo var (default 0.05).
# CLI --hallucination-fail-above overrides when set.

on:
  workflow_call:

jobs:
  eval-hallucination:
    name: "Hallucination eval scorecard"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install eval dependencies
        run: |
          pip install \
            "arize-phoenix>=4.0" \
            "openinference-instrumentation-openai>=0.1.4" \
            "opentelemetry-sdk>=1.20" \
            "opentelemetry-exporter-otlp-proto-http>=1.20" \
            "networkx>=3.0" \
            "tiktoken>=0.5" \
            "httpx>=0.25" \
            "langchain-core>=0.2" \
            "langchain-openai>=0.1" \
            "langchain-anthropic>=0.1"

      - name: Detect hallucination fixtures
        id: detect
        run: |
          if [ -f .agent-rfc/fixtures/hallucination_evals.json ] || [ -f fixtures/hallucination_evals_base.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No hallucination fixtures — skipping suite."
          fi

      - name: Run hallucination eval scorecard
        if: steps.detect.outputs.present == 'true'
        env:
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          AGENT_MODEL_ARCHITECT:     ${{ secrets.AGENT_MODEL_ARCHITECT }}
          AGENT_MODEL_COMPLEX:       ${{ secrets.AGENT_MODEL_COMPLEX }}
          AGENT_JUDGE_MODEL:         ${{ secrets.AGENT_JUDGE_MODEL || 'claude-sonnet-4-6' }}
          AGENT_PHOENIX_ENDPOINT:     ${{ secrets.AGENT_PHOENIX_ENDPOINT || '' }}
          AGENT_OWNER_ID:            ${{ secrets.AGENT_OWNER_ID || 'ci@agenticframework' }}
          HALLUCINATION_FAIL_ABOVE:    ${{ vars.HALLUCINATION_FAIL_ABOVE || '0.05' }}
        run: python3 scripts/run-evals.py --suite hallucination

      - name: Upload hallucination eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hallucination-eval-results-${{ github.run_id }}
          path: .agent-rfc/fixtures/hallucination_eval_results.json
          if-no-files-found: ignore
