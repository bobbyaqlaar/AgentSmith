name: "CI: Python/FastAPI Guardrails"

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]

concurrency:
  group: ci-py-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: "Guardrails — Python/FastAPI"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install \
            pytest pytest-asyncio pytest-cov httpx ruff \
            "arize-phoenix>=4.0" \
            "openinference-instrumentation-openai>=0.1.4" \
            "opentelemetry-sdk>=1.20" \
            "opentelemetry-exporter-otlp-proto-http>=1.20" \
            "networkx>=3.0" \
            "tiktoken>=0.5" \
            "langchain-core>=0.2" \
            "langchain-openai>=0.1" \
            "langchain-anthropic>=0.1"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          ENVIRONMENT:  "testing"
        run: pytest --cov --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  eval-scorecard:
    name: "Eval scorecard"
    uses: ./.github/workflows/eval-scorecard.yml
    secrets: inherit
