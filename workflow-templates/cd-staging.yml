# Tenant-scoped CD — applies to THIS repository only.
# tenant.id: {{TENANT_ID}}
# Do not reference org-level shared secrets beyond this tenant's GitHub Environment.

name: "CD: Staging Deploy"

# Runs on every push to develop.
# Eval fail gate (below 0.75) + smoke test. Staging failure blocks promotion to main.

on:
  push:
    branches: ["develop"]

concurrency:
  group: cd-staging-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-flight deploys

jobs:
  deploy:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    permissions:
      contents: read
      packages: write   # only used if a Dockerfile is present — see build-push-ghcr

    env:
      ENVIRONMENT: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── GCP auth (optional — skips when neither WIF nor SA key is configured) ─
      # Must run before build-push-ghcr when pushing to Artifact Registry, and
      # before the deploy step when using gcloud/kubectl. Sets ADC on the runner
      # so any subsequent step calling google.auth.default() is authenticated.
      # See OPERATIONS.md §4 (GCP deployment specifics) for one-time setup instructions.
      - name: "Authenticate to GCP"
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── Containerize + push to GHCR (optional — skips if no Dockerfile) ────
      # The pushed image_ref is exported as $IMAGE_REF for DEPLOY_COMMAND to
      # consume (e.g. `flyctl deploy --image "$IMAGE_REF"`); for on-prem/K8s
      # customers it's the artifact templates/onprem-deploy/ expects.
      #
      # ⚠️  Cloud Run deployments: Cloud Run rejects GHCR images. You must
      # re-push to Artifact Registry before deploying. See
      # .github/workflows/cd-portal.yml for the complete AR re-push + digest
      # promotion pattern used by the AgentSmith Ops Portal.
      - name: "Build & push container image"
        id: image
        uses: ./.github/actions/build-push-ghcr

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install framework dependencies
        run: |
          pip install \
            "arize-phoenix>=4.0" \
            "openinference-instrumentation-openai>=0.1.4" \
            "opentelemetry-sdk>=1.20" \
            "opentelemetry-exporter-otlp-proto-http>=1.20" \
            "networkx>=3.0" \
            "tiktoken>=0.5" \
            "httpx>=0.25" \
            "langchain-core>=0.2" \
            "langchain-openai>=0.1" \
            "langchain-anthropic>=0.1"

      # ── Deploy to staging. Set the DEPLOY_COMMAND secret on this tenant's
      # GitHub Environment to wire in your platform — no workflow YAML edit
      # needed. Unset = no-op placeholder (OPERATIONS.md "Wire your platform").
      - name: "Deploy to staging"
        uses: ./.github/actions/deploy-placeholder
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        with:
          deploy_command: ${{ secrets.DEPLOY_COMMAND }}
          environment_label: staging

      # ── Redaction compliance — staging profile must scrub secrets/PII ──────
      - name: "Trace redaction compliance check"
        env:
          ENVIRONMENT: staging
        run: python3 scripts/verify_system.py --check-redaction

      # ── Sync history to the Ops Portal (optional — skips silently if the
      # secrets below aren't configured for this tenant's GitHub Environment) ──
      - name: "Sync history to Ops Portal"
        env:
          OPS_PORTAL_URL:        ${{ secrets.OPS_PORTAL_URL }}
          OPS_PORTAL_SYNC_TOKEN: ${{ secrets.OPS_PORTAL_SYNC_TOKEN }}
        run: python3 scripts/sync-portal-history.py

      # ── Post-deploy smoke: eval fail gate at 0.75 ──────────────────────────
      - name: "Post-deploy eval smoke test"
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          AGENT_MODEL_ARCHITECT:  ${{ secrets.AGENT_MODEL_ARCHITECT }}
          AGENT_MODEL_COMPLEX:    ${{ secrets.AGENT_MODEL_COMPLEX }}
          AGENT_JUDGE_MODEL:      ${{ secrets.AGENT_JUDGE_MODEL || 'claude-sonnet-4-6' }}
          AGENT_PHOENIX_ENDPOINT: ${{ secrets.AGENT_PHOENIX_ENDPOINT }}
          AGENT_OWNER_ID:         ${{ secrets.AGENT_OWNER_ID || 'cd@agenticframework' }}
        run: python3 scripts/run-evals.py --fail-below 0.75
        # No continue-on-error — failure blocks promotion to main

      - name: "Smoke failure notice"
        if: failure()
        uses: ./.github/actions/rollback-notify
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          teams_webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          # No rollback_command on staging by default — there's nothing in
          # production to roll back yet; this just notifies + fails red.
          # Promotion to production is already blocked by this failure.
          environment_label: staging
          failure_context: "Staging smoke test failed below 0.75 — promotion to production is blocked"
