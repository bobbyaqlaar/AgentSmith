name: "CI: Go Guardrails"

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]

concurrency:
  group: ci-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: "Guardrails — Go"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ gofmt violations:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  eval-scorecard:
    name: "Eval scorecard"
    uses: ./.github/workflows/eval-scorecard.yml
    secrets: inherit
