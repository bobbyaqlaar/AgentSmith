# Traefik overlay — adds the ingress/canary/shadow layer when
# PROXY_ENGINE=traefik (scripts/up.sh picks this file automatically).
# Dynamic routing config lives in proxy/traefik/dynamic.yml — generated by
# scripts/render-traefik-config.sh from .env's CANARY_WEIGHT_PERCENT /
# SHADOW_MIRROR_PERCENT before this comes up, since Traefik's file
# provider doesn't itself do env-var substitution.

services:
  proxy:
    image: traefik:v3.1
    container_name: onprem-proxy-traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "${PROXY_LISTEN_PORT:-80}:80"
    volumes:
      - ./proxy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./proxy/traefik/dynamic.rendered.yml:/etc/traefik/dynamic/dynamic.yml:ro
    depends_on:
      app-prod:
        condition: service_healthy
    networks:
      - onprem
    logging:
      driver: json-file   # Traefik's own access/app logs are JSON to stdout — see traefik.yml
