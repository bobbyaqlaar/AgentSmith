{{- if .Values.shadow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onprem.fullname" . }}-shadow
  labels:
    app.kubernetes.io/name: {{ include "onprem.fullname" . }}
    app.kubernetes.io/component: shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "onprem.fullname" . }}
      app.kubernetes.io/component: shadow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "onprem.fullname" . }}
        app.kubernetes.io/component: shadow
    spec:
      containers:
        - name: app
          # Receives mirrored traffic only (see httproute.yaml's
          # RequestMirror filter) — never gets real client traffic routed
          # to it. See ../../README.md's warning: if your app has side
          # effects, this must run a dry-run-safe build, since the
          # mirrored request is replayed verbatim, not specially flagged.
          image: {{ .Values.image.shadow }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.image.port }}
          {{- include "onprem.envFrom" . | nindent 10 }}
          env:
            {{- include "onprem.env" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /healthz, port: {{ .Values.image.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
