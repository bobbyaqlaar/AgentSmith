{{- if .Values.withDb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "onprem.fullname" . }}-db
spec:
  serviceName: {{ include "onprem.fullname" . }}-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "onprem.fullname" . }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "onprem.fullname" . }}
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: db
          image: {{ .Values.withDb.image }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ required "withDb.credentialsSecretName must be set when withDb.enabled=true (see ../README.md)" .Values.withDb.credentialsSecretName }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.withDb.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "onprem.fullname" . }}-db
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "onprem.fullname" . }}
    app.kubernetes.io/component: db
  ports:
    - port: 5432
{{- end }}
